    <div class="post-body" itemprop="articleBody"><h2 id="code"><a href="#code" class="headerlink" title="code"></a>code</h2><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">Map&lt;String, String&gt; map = <span class="keyword">new</span> <span class="title class_">HashMap</span>&lt;&gt;();</span><br><span class="line"></span><br><span class="line"><span class="comment">// 往 HashMap 添加一些元素</span></span><br><span class="line">map.put(<span class="string">&quot;name&quot;</span>, <span class="string">&quot;韩朵朵&quot;</span>);</span><br><span class="line">map.put(<span class="string">&quot;level&quot;</span>, <span class="string">&quot;S&quot;</span>);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 添加重复的key元素</span></span><br><span class="line"><span class="type">String</span> <span class="variable">name</span> <span class="operator">=</span> map.put(<span class="string">&quot;name&quot;</span>, <span class="string">&quot;黛西&quot;</span>);</span><br><span class="line">System.out.println(<span class="string">&quot;替换后的 HashMap: &quot;</span> + map);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 查看被替换的值</span></span><br><span class="line">System.out.println(<span class="string">&quot;name: &quot;</span> + name);</span><br></pre></td></tr></table></figure>
